<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Soulmates – Upcoming Events</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:    #73976C;
    --sage-light: #9ab894;
    --charcoal:#5A5A5A;
    --lime:    #E5E577;
    --purple:  #8863A8;
    --blue:    #5D79B0;
    --berry:   #BC4367;
    --bg:      #141414;
    --bg2:     #1e1e1e;
    --bg3:     #272727;
    --border:  rgba(255,255,255,.08);
    --text:    #f0ede8;
    --text-muted: rgba(240,237,232,.55);
    --col-cambridge:   #F2D9DC;
    --col-online:      #D9E3F2;
    --col-ely:         #D6EDD9;
    --col-huntingdon:  #E8DCEF;
    --col-peterborough:#E0E0E0;
    --col-st-neots:    #FDFAD5;
    --col-st-ives:     #D6EFE8;
    --col-march:       #FFE0C8;
    --col-default:     #e0e0e0;
    --font-size-base: 1rem;
    --radius: 18px;
  }

  body.large-print { --font-size-base: 1.28rem; }
  body.large-print .card-title { font-size: 1.5rem !important; }
  body.large-print .card-desc  { font-size: 1.1rem !important; }
  body.large-print .tag        { font-size: .9rem !important; }
  body.large-print .filter-btn { font-size: 1rem !important; }

  body.high-contrast {
    --bg: #000; --bg2: #111; --bg3: #1a1a1a;
    --text: #ffffff; --text-muted: #cccccc;
    --border: rgba(255,255,255,.3);
  }
  body.high-contrast .card { border: 2px solid rgba(255,255,255,.4) !important; }
  body.high-contrast .filter-btn.active { outline: 3px solid #fff; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: var(--font-size-base);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: font-size .2s;
  }

  /* ACCESSIBILITY BAR */
  .a11y-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .a11y-label { font-size: .78rem; color: var(--text-muted); margin-right: 4px; }
  .a11y-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 30px;
    padding: 5px 14px;
    font-size: .8rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background .18s, border-color .18s;
  }
  .a11y-btn:hover { background: var(--bg3); border-color: var(--sage); }
  .a11y-btn.active { background: var(--sage); border-color: var(--sage); color: #fff; }
  .a11y-btn:focus-visible { outline: 3px solid var(--lime); outline-offset: 2px; }

  /* HERO — photo version */
  .hero {
    position: relative;
    width: 100%;
    height: 340px;
    overflow: hidden;
  }
  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.65) 100%);
  }
  .hero-text {
    position: absolute;
    bottom: 2.2rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 90%;
    z-index: 2;
  }
  .hero-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    margin-bottom: 0.5rem;
  }
  .hero-text h1 span { color: var(--lime); }
  .hero-text p {
    color: rgba(255,255,255,0.88);
    font-size: 1.05rem;
    background: rgba(0,0,0,0.3);
    display: inline-block;
    padding: 5px 16px;
    border-radius: 999px;
    line-height: 1.65;
  }

  /* FILTER BAR */
  .filter-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(20,20,20,.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  .filter-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    max-width: 1200px;
    margin: 0 auto;
    padding-bottom: 2px;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 30px;
    padding: 8px 18px;
    font-size: .88rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-btn:hover { border-color: var(--sage); color: var(--sage-light); }
  .filter-btn.active { background: var(--sage); border-color: var(--sage); color: #fff; font-weight: 700; }
  .filter-btn:focus-visible { outline: 3px solid var(--lime); outline-offset: 2px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; border: 1.5px solid rgba(255,255,255,.2); }

  /* GRID */
  .events-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 60px; }
  .events-count { font-size: .88rem; color: var(--text-muted); margin-bottom: 20px; }
  .events-count strong { color: var(--sage-light); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; }

  /* CARD */
  .card {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform .22s ease, box-shadow .22s ease, border-color .22s;
    animation: fadeUp .35s ease both;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.4); border-color: rgba(115,151,108,.35); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .card-img { width: 100%; height: 180px; object-fit: cover; display: block; }
  .card-img-placeholder { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
  .card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: .75rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; color: #222; }
  .tag.status-sold-out { background: #e55; color: #fff; }
  .tag.status-free     { background: var(--lime); }
  .tag.status-booking  { background: var(--blue); color: #fff; }
  .tag.status-new      { background: var(--berry); color: #fff; }
  .tag.status-upcoming { background: var(--bg3); color: var(--text-muted); border: 1px solid var(--border); }

  .card-title { font-family: 'DM Serif Display', serif; font-size: 1.18rem; color: var(--text); line-height: 1.3; }
  .card-desc  { font-size: .9rem; color: var(--text-muted); line-height: 1.6; flex: 1; }

  .card-access { background: var(--bg3); border-radius: 10px; padding: 10px 12px; font-size: .82rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
  .card-access-row { display: flex; align-items: flex-start; gap: 7px; }
  .card-access-row span:first-child { flex-shrink: 0; }

  .card-meta { display: flex; align-items: center; gap: 14px; font-size: .85rem; color: var(--text-muted); flex-wrap: wrap; }
  .card-meta-item { display: flex; align-items: center; gap: 5px; }
  .card-footer { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }

  .btn { display: block; width: 100%; padding: 13px 20px; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 700; text-align: center; text-decoration: none; cursor: pointer; border: none; transition: opacity .18s, transform .12s; }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn:focus-visible { outline: 3px solid var(--lime); outline-offset: 2px; }
  .btn-primary   { background: var(--sage); color: #fff; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1.5px solid var(--border); }
  .btn-listen { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); font-size: .82rem; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; width: 100%; justify-content: center; transition: border-color .18s, color .18s; }
  .btn-listen:hover { border-color: var(--sage); color: var(--text); }
  .btn-listen:focus-visible { outline: 3px solid var(--lime); outline-offset: 2px; }

  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
  .empty h3 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }

  .loading { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: .95rem; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--sage); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; padding: 32px 20px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: .85rem; line-height: 1.6; }
  .footer a { color: var(--sage-light); }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .hero { height: 260px; }
    .hero-text h1 { font-size: 1.8rem; }
    .a11y-bar { justify-content: flex-start; }
  }
</style>
</head>
<body>

<!-- ACCESSIBILITY BAR -->
<div class="a11y-bar" role="toolbar" aria-label="Accessibility options">
  <span class="a11y-label">Accessibility:</span>
  <button class="a11y-btn" id="btn-large-print" onclick="toggleLargePrint()" aria-pressed="false">🔡 Large Print</button>
  <button class="a11y-btn" id="btn-contrast" onclick="toggleContrast()" aria-pressed="false">◑ High Contrast</button>
</div>

<!-- HERO PHOTO -->
<header class="hero">
  <img class="hero-img" src="hero.png" alt="Safe Soulmates community members together">
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <h1>Upcoming <span>Events</span></h1>
    <p>Safe Soulmates — fun, friendly, and accessible events for our community. Everyone is welcome.</p>
  </div>
</header>

<!-- FILTER BAR -->
<nav class="filter-wrap" aria-label="Filter events by location">
  <div class="filter-scroll" role="list">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')" role="listitem">🗓️ All Events</button>
    <button class="filter-btn" data-filter="Cambridge" onclick="setFilter('Cambridge')" role="listitem"><span class="dot" style="background:#F2D9DC"></span> Cambridge</button>
    <button class="filter-btn" data-filter="Peterborough" onclick="setFilter('Peterborough')" role="listitem"><span class="dot" style="background:#E0E0E0"></span> Peterborough</button>
    <button class="filter-btn" data-filter="Online" onclick="setFilter('Online')" role="listitem"><span class="dot" style="background:#D9E3F2"></span> Online</button>
    <button class="filter-btn" data-filter="Other Events of Interest" onclick="setFilter('Other Events of Interest')" role="listitem">✨ Other Events of Interest</button>
    <button class="filter-btn" data-filter="St Neots" onclick="setFilter('St Neots')" role="listitem"><span class="dot" style="background:#FDFAD5"></span> St Neots</button>
    <button class="filter-btn" data-filter="Huntingdon" onclick="setFilter('Huntingdon')" role="listitem"><span class="dot" style="background:#E8DCEF"></span> Huntingdon</button>
    <button class="filter-btn" data-filter="Ely" onclick="setFilter('Ely')" role="listitem"><span class="dot" style="background:#D6EDD9"></span> Ely</button>
    <button class="filter-btn" data-filter="St Ives" onclick="setFilter('St Ives')" role="listitem"><span class="dot" style="background:#D6EFE8"></span> St Ives</button>
    <button class="filter-btn" data-filter="Day Trips" onclick="setFilter('Day Trips')" role="listitem">🚌 Day Trips</button>
    <button class="filter-btn" data-filter="March" onclick="setFilter('March')" role="listitem"><span class="dot" style="background:#FFE0C8"></span> March</button>
  </div>
</nav>

<!-- EVENTS -->
<main class="events-wrap">
  <p class="events-count" id="events-count" aria-live="polite"></p>
  <div class="grid" id="events-grid" role="list" aria-label="Events list">
    <div class="loading"><div class="spinner" aria-hidden="true"></div>Loading events…</div>
  </div>
</main>

<footer class="footer">
  <p>Questions? Get in touch with the Safe Soulmates team. 💚</p>
  <p style="margin-top:6px; font-size:.8rem;">Events update automatically from our events sheet.</p>
</footer>

<script>
  const SHEET_ID = '1eO53B-vq5IksXtB93cEPuHKrin45FKLvqOfBuTtd9yo';
  const SHEET_NAME = 'Sheet1';

  const locationColours = {
    'cambridge':'#F2D9DC','online':'#D9E3F2','ely':'#D6EDD9',
    'huntingdon':'#E8DCEF','peterborough':'#E0E0E0','st neots':'#FDFAD5',
    'st ives':'#D6EFE8','march':'#FFE0C8','day trips':'#FFF3CD',
  };
  const locationEmojis = {
    'cambridge':'🌉','online':'💻','ely':'⛪','huntingdon':'🦌',
    'peterborough':'🏛️','st neots':'🏘️','st ives':'🌿','march':'🕰️','day trips':'🚌',
  };

  let allEvents = [];
  let currentFilter = 'all';

  async function loadEvents() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      const rows = json.table.rows;
      const cols = json.table.cols.map(c => c.label.toLowerCase().trim());
      allEvents = rows
        .map(row => {
          const obj = {};
          cols.forEach((col, i) => {
            const cell = row.c[i];
            obj[col] = cell ? (cell.f || cell.v || '') : '';
          });
          return obj;
        })
        .filter(e => e['event name'] && e['event name'].toString().trim() !== '');
      renderEvents();
    } catch (err) {
      document.getElementById('events-grid').innerHTML = `
        <div class="empty">
          <span class="empty-icon">⚠️</span>
          <h3>Couldn't load events right now</h3>
          <p>Please try refreshing the page. If the problem continues, get in touch with the team.</p>
        </div>`;
      console.error(err);
    }
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
      b.setAttribute('aria-pressed', b.dataset.filter === filter);
    });
    renderEvents();
  }

  function renderEvents() {
    const grid = document.getElementById('events-grid');
    const countEl = document.getElementById('events-count');
    let filtered = allEvents;
    if (currentFilter !== 'all') {
      filtered = allEvents.filter(e =>
        (e['location'] || '').toLowerCase().includes(currentFilter.toLowerCase()) ||
        (e['tags'] || '').toLowerCase().includes(currentFilter.toLowerCase())
      );
    }
    countEl.innerHTML = `Showing <strong>${filtered.length}</strong> event${filtered.length !== 1 ? 's' : ''}${currentFilter !== 'all' ? ` in <strong>${currentFilter}</strong>` : ''}`;
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty"><span class="empty-icon">🔍</span><h3>No events found</h3><p>There are no events in this area right now. Try a different filter or check back soon!</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map((e, i) => buildCard(e, i)).join('');
  }

  function buildCard(e, i) {
    const name        = e['event name'] || '';
    const date        = e['date'] || '';
    const time        = e['time'] || '';
    const location    = e['location'] || '';
    const description = e['description'] || '';
    const tags        = e['tags'] || '';
    const btnText     = e['button text'] || 'Find Out More';
    const btnLink     = e['button link'] || '#';
    const imageUrl    = e['image url'] || '';
    const status      = (e['status'] || '').toString().trim();
    const accessNotes = e['accessibility notes'] || '';
    const sensory     = e['sensory info'] || '';
    const transport   = e['transport info'] || '';
    const cost        = e['cost'] || '';
    const booking     = e['booking required'] || '';
    const contact     = e['contact'] || '';

    const locKey    = location.toLowerCase();
    const locColour = locationColours[locKey] || '#e0e0e0';
    const locEmoji  = locationEmojis[locKey] || '📍';

    const imgHtml = imageUrl
      ? `<img class="card-img" src="${imageUrl}" alt="${name}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-img-placeholder style=background:${locColour}>${locEmoji}</div>'">`
      : `<div class="card-img-placeholder" style="background:${locColour}">${locEmoji}</div>`;

    const locTag    = location ? `<span class="tag" style="background:${locColour};color:#222">${location}</span>` : '';
    const extraTags = tags ? tags.split(',').map(t => `<span class="tag" style="background:var(--bg3);color:var(--text-muted);border:1px solid var(--border)">${t.trim()}</span>`).join('') : '';
    const statusKey = status.toLowerCase().replace(/\s+/g, '-');
    const statusTag = status ? `<span class="tag status-${statusKey}">${status}</span>` : '';
    const costTag   = cost ? `<span class="tag" style="background:var(--lime);color:#222">${cost}</span>` : '';

    const accessRows = [
      accessNotes ? `<div class="card-access-row"><span>♿</span><span>${accessNotes}</span></div>` : '',
      sensory     ? `<div class="card-access-row"><span>🔊</span><span>${sensory}</span></div>` : '',
      transport   ? `<div class="card-access-row"><span>🚌</span><span>${transport}</span></div>` : '',
      booking === 'Yes' ? `<div class="card-access-row"><span>🎟️</span><span>Booking required</span></div>` : '',
      contact     ? `<div class="card-access-row"><span>💬</span><span>Contact: ${contact}</span></div>` : '',
    ].filter(Boolean).join('');
    const accessBlock = accessRows ? `<div class="card-access" aria-label="Accessibility information">${accessRows}</div>` : '';

    const metaItems = [
      date ? `<span class="card-meta-item">📅 ${date}</span>` : '',
      time ? `<span class="card-meta-item">🕐 ${time}</span>` : '',
    ].filter(Boolean).join('');
    const metaHtml = metaItems ? `<div class="card-meta">${metaItems}</div>` : '';

    const listenText = `${name}. ${date ? 'Date: '+date+'.' : ''} ${time ? 'Time: '+time+'.' : ''} ${location ? 'Location: '+location+'.' : ''} ${description} ${accessNotes ? 'Accessibility: '+accessNotes : ''}`.replace(/"/g, '&quot;');
    const delay = Math.min(i * 0.05, 0.4);

    return `
      <article class="card" role="listitem" style="animation-delay:${delay}s" aria-label="${name}">
        ${imgHtml}
        <div class="card-body">
          <div class="tags">${locTag}${extraTags}${statusTag}${costTag}</div>
          <h2 class="card-title">${name}</h2>
          ${description ? `<p class="card-desc">${description}</p>` : ''}
          ${accessBlock}
          ${metaHtml}
        </div>
        <div class="card-footer">
          ${btnLink && btnLink !== '#'
            ? `<a href="${btnLink}" class="btn btn-primary" target="_blank" rel="noopener">${btnText}</a>`
            : `<button class="btn btn-secondary" disabled>${btnText}</button>`}
          <button class="btn-listen" onclick="speakEvent(\`${listenText}\`)" aria-label="Listen to event details for ${name}">
            🔊 Listen to this event
          </button>
        </div>
      </article>`;
  }

  let currentUtterance = null;
  function speakEvent(text) {
    if (currentUtterance) { window.speechSynthesis.cancel(); currentUtterance = null; return; }
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.9; utter.pitch = 1;
    utter.onend = () => { currentUtterance = null; };
    currentUtterance = utter;
    window.speechSynthesis.speak(utter);
  }

  function toggleLargePrint() {
    const btn = document.getElementById('btn-large-print');
    document.body.classList.toggle('large-print');
    const on = document.body.classList.contains('large-print');
    btn.classList.toggle('active', on);
    btn.setAttribute('aria-pressed', on);
  }

  function toggleContrast() {
    const btn = document.getElementById('btn-contrast');
    document.body.classList.toggle('high-contrast');
    const on = document.body.classList.contains('high-contrast');
    btn.classList.toggle('active', on);
    btn.setAttribute('aria-pressed', on);
  }

  loadEvents();
</script>
</body>
</html>
